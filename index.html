<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CrimeMap UK</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --surface: #111418;
    --border: #1e2530;
    --accent: #ff3b3b;
    --text: #c8d0dc;
    --text-dim: #4a5568;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Barlow Condensed', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    z-index: 1000;
    flex-wrap: wrap;
  }

  .logo {
    font-family: var(--mono);
    font-size: 1.1rem;
    color: var(--accent);
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  .logo span { color: var(--text-dim); }

  .controls {
    display: flex;
    gap: 6px;
    flex: 1;
    flex-wrap: wrap;
    align-items: center;
    justify-content: flex-end;
  }

  #status-badge {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--text-dim);
    padding: 0 4px;
    white-space: nowrap;
    display: none;
    flex: 1;
    min-width: 100%;
    order: 99;
  }

  #status-badge.visible { display: block; }

  input[type="month"],
  input[type="text"] {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.8rem;
    padding: 6px 10px;
    border-radius: 3px;
    cursor: pointer;
    transition: border-color 0.15s;
    color-scheme: dark;
  }

  input[type="text"] {
    width: 110px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  input[type="text"]::placeholder { color: var(--text-dim); text-transform: none; letter-spacing: 0; }

  input:hover, input:focus { border-color: var(--accent); outline: none; }

  input.error { border-color: #ff6b6b; animation: shake 0.3s ease; }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-4px); }
    75%      { transform: translateX(4px); }
  }

  button {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 6px 12px;
    border-radius: 3px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
    white-space: nowrap;
  }

  button:hover:not(:disabled) { border-color: var(--accent); color: #fff; }

  #locate-btn {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  #locate-btn:hover:not(:disabled) { background: #cc2020; border-color: #cc2020; }
  #locate-btn:disabled { background: #2a1010; border-color: #3a1515; color: #664444; cursor: not-allowed; }

  #postcode-btn {
    background: var(--bg);
    border-color: var(--border);
  }

  /* Divider between location methods */
  .divider {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--text-dim);
    padding: 0 2px;
  }

  /* Cached location pill */
  #cached-loc {
    display: none;
    align-items: center;
    gap: 6px;
    background: rgba(255,59,59,0.08);
    border: 1px solid rgba(255,59,59,0.25);
    border-radius: 3px;
    padding: 4px 10px;
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text);
  }

  #cached-loc.visible { display: flex; }

  #cached-loc .loc-label { color: var(--text-dim); margin-right: 2px; }

  #clear-loc {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 0.8rem;
    padding: 0 2px;
    cursor: pointer;
    line-height: 1;
    letter-spacing: 0;
  }

  #clear-loc:hover { color: var(--accent); }

  #map { flex: 1; position: relative; z-index: 1; }

  .locating-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 500;
    display: none;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .locating-overlay.active { display: flex; }

  .pulse-ring {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    animation: pulse-out 1.4s ease-out infinite;
  }

  @keyframes pulse-out {
    0%   { transform: scale(0.3); opacity: 1; }
    100% { transform: scale(2.5); opacity: 0; }
  }

  #panel {
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    max-height: 38vh;
    overflow-y: auto;
    transition: max-height 0.3s ease;
  }

  #panel.collapsed { max-height: 40px; overflow: hidden; }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 10;
  }

  .panel-title {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  .panel-count {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--accent);
  }

  .toggle-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 1rem;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
  }

  #stats {
    display: flex;
    overflow-x: auto;
    padding: 8px 12px;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
  }

  #stats::-webkit-scrollbar { display: none; }
  #stats:empty { display: none; }

  .stat-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 4px 12px;
    border-right: 1px solid var(--border);
    min-width: 70px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .stat-item:last-child { border-right: none; }
  .stat-item:hover { background: rgba(255,59,59,0.06); }
  .stat-item.active { background: rgba(255,59,59,0.1); }

  .stat-num {
    font-family: var(--mono);
    font-size: 1.1rem;
    color: var(--accent);
    line-height: 1.1;
  }

  .stat-label {
    font-size: 0.62rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    text-align: center;
    margin-top: 2px;
    white-space: nowrap;
  }

  #crime-list { padding: 8px 12px; }

  .crime-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
  }

  .crime-item:hover { background: rgba(255,255,255,0.02); }
  .crime-item:last-child { border-bottom: none; }

  .crime-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 5px;
  }

  .crime-info { flex: 1; min-width: 0; }

  .crime-cat {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }

  .crime-meta {
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .crime-outcome {
    font-size: 0.68rem;
    color: var(--text-dim);
    font-style: italic;
    margin-top: 2px;
  }

  #status {
    text-align: center;
    padding: 30px 20px;
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--text-dim);
    line-height: 2;
  }

  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .leaflet-container { background: #0d1117 !important; }
  .leaflet-tile-pane { filter: brightness(0.85) saturate(0.5); }

  .leaflet-popup-content-wrapper {
    background: var(--surface) !important;
    border: 1px solid var(--border) !important;
    border-radius: 4px !important;
    color: var(--text) !important;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
  }

  .leaflet-popup-tip { background: var(--surface) !important; }

  .popup-cat {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 0.9rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }

  .popup-row {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .leaflet-control-zoom a {
    background: var(--surface) !important;
    color: var(--text) !important;
    border-color: var(--border) !important;
  }

  .leaflet-control-attribution {
    background: rgba(10,12,15,0.7) !important;
    color: var(--text-dim) !important;
    font-size: 0.6rem !important;
  }

  #panel::-webkit-scrollbar { width: 4px; }
  #panel::-webkit-scrollbar-track { background: var(--bg); }
  #panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }


  #welcome-backdrop {
    display: flex;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 3000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  #welcome-modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 3px solid var(--accent);
    border-radius: 4px;
    padding: 32px 26px 22px;
    max-width: 360px;
    width: 100%;
    box-shadow: 0 8px 40px rgba(0,0,0,0.7);
    animation: modal-in 0.25s ease;
  }

  #modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 2000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  #modal-backdrop.visible { display: flex; }

  #modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 3px solid var(--accent);
    border-radius: 4px;
    padding: 28px 24px 20px;
    max-width: 360px;
    width: 100%;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    animation: modal-in 0.2s ease;
  }

  @keyframes modal-in {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .modal-icon { font-size: 2rem; margin-bottom: 12px; }

  .modal-title {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .modal-body {
    font-family: var(--sans);
    font-size: 0.95rem;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 6px;
  }

  .modal-sub {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--text-dim);
    line-height: 1.6;
    margin-bottom: 20px;
  }

  .modal-close {
    background: var(--accent);
    border: none;
    border-radius: 3px;
    color: #fff;
    font-family: var(--sans);
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 8px 20px;
    cursor: pointer;
    width: 100%;
    transition: background 0.15s;
  }

  .modal-close:hover { background: #cc2020; }
</style>
</head>
<body>

<header>
  <div class="logo">CRIME<span>MAP</span></div>
  <div class="controls">

    <!-- Cached location pill — shown when location is saved -->
    <div id="cached-loc">
      <span class="loc-label">📍</span>
      <span id="cached-label">—</span>
      <button id="clear-loc" title="Clear saved location" onclick="clearLocation()">✕</button>
    </div>

    <input type="month" id="monthInput" />

    <!-- Postcode fallback -->
    <input type="text" id="postcodeInput" placeholder="Postcode" maxlength="8"
           onkeydown="if(event.key==='Enter') lookupPostcode()" />
    <button id="postcode-btn" onclick="lookupPostcode()">GO</button>

    <span class="divider">or</span>

    <button id="locate-btn" onclick="loadCrimesNearMe()">📍 Near Me</button>

    <span id="status-badge"></span>
  </div>
</header>

<div id="map">
  <div class="locating-overlay" id="locating-overlay">
    <div class="pulse-ring"></div>
  </div>
</div>

<div id="panel">
  <div class="panel-header" onclick="togglePanel()">
    <span class="panel-title">// INCIDENT LOG</span>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="panel-count" id="panel-count">—</span>
      <button class="toggle-btn" id="toggle-icon">▼</button>
    </div>
  </div>
  <div id="stats"></div>
  <div id="crime-list"></div>
</div>



<div id="welcome-backdrop" onclick="closeWelcome()">
  <div id="welcome-modal" onclick="event.stopPropagation()">
    <div class="modal-icon">🚓</div>
    <div class="modal-title">// CrimeMap UK</div>
    <div class="modal-body">Use <span style="color:var(--accent)">📍 Near Me</span> to load crimes around your current location, or type a postcode and hit <span style="color:var(--accent)">GO</span>.</div>
    <div class="modal-sub">Powered by the UK Police Data API · Location saved for this session</div>
    <button class="modal-close" onclick="closeWelcome()">GET STARTED</button>
  </div>
</div>
<div id="modal-backdrop" onclick="closeModal()">
  <div id="modal" onclick="event.stopPropagation()">
    <div class="modal-icon">📭</div>
    <div class="modal-title">// No Data Found</div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-sub" id="modal-sub"></div>
    <button class="modal-close" onclick="closeModal()">DISMISS</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ── COLOURS ──────────────────────────────────────────────────────────────────
const CAT_COLORS = {
  'anti-social-behaviour':  '#ff6b6b',
  'bicycle-theft':          '#ffa94d',
  'burglary':               '#ff3b3b',
  'criminal-damage-arson':  '#ff6348',
  'drugs':                  '#a29bfe',
  'other-theft':            '#fab1a0',
  'possession-of-weapons':  '#fd79a8',
  'public-order':           '#fdcb6e',
  'robbery':                '#e17055',
  'shoplifting':            '#00cec9',
  'theft-from-the-person':  '#74b9ff',
  'vehicle-crime':          '#0984e3',
  'violent-crime':          '#d63031',
  'other-crime':            '#636e72',
  'default':                '#b2bec3'
};

function catColor(cat) { return CAT_COLORS[cat] || CAT_COLORS['default']; }
function catLabel(cat) { return cat.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase()); }

// ── MAP ───────────────────────────────────────────────────────────────────────
const map = L.map('map', { center: [54.5, -3], zoom: 5 });

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

const markers = L.layerGroup().addTo(map);
let allCrimes = [];
let activeFilter = null;
let panelCollapsed = false;
let userMarker = null;

// ── LOCATION CACHE (sessionStorage — cleared when tab closes) ─────────────────
const CACHE_KEY = 'crimemap_location';

function saveLocation(lat, lng, label) {
  sessionStorage.setItem(CACHE_KEY, JSON.stringify({ lat, lng, label }));
  showCachedPill(label);
}

function loadCachedLocation() {
  try { return JSON.parse(sessionStorage.getItem(CACHE_KEY)); }
  catch { return null; }
}

function clearLocation() {
  sessionStorage.removeItem(CACHE_KEY);
  hideCachedPill();
  if (userMarker) { userMarker.remove(); userMarker = null; }
  setBadge('Location cleared');
}

function showCachedPill(label) {
  document.getElementById('cached-label').textContent = label;
  document.getElementById('cached-loc').classList.add('visible');
}

function hideCachedPill() {
  document.getElementById('cached-loc').classList.remove('visible');
}

// ── DEFAULT MONTH ─────────────────────────────────────────────────────────────
(function () {
  const d = new Date();
  d.setMonth(d.getMonth() - 1);
  document.getElementById('monthInput').value =
    `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;

  // Restore cached location pill on load
  const cached = loadCachedLocation();
  if (cached) showCachedPill(cached.label);
})();

// ── NEAR ME — uses cache if available, otherwise asks for permission ──────────
function loadCrimesNearMe() {
  const month = document.getElementById('monthInput').value;
  if (!month) { setBadge('Select a month first'); return; }

  // Use cached coords if we have them
  const cached = loadCachedLocation();
  if (cached) {
    setBadge(`Using saved location: ${cached.label}`);
    placeUserPin(cached.lat, cached.lng, cached.label);
    fetchCrimes(cached.lat, cached.lng, month);
    return;
  }

  // First time — ask the browser
  if (!navigator.geolocation) {
    setBadge('Geolocation not supported — try entering a postcode');
    return;
  }

  const btn = document.getElementById('locate-btn');
  btn.disabled = true;
  btn.textContent = 'LOCATING...';
  setBadge('Getting your location...');
  document.getElementById('locating-overlay').classList.add('active');

  navigator.geolocation.getCurrentPosition(
    position => {
      const { latitude: lat, longitude: lng } = position.coords;
      document.getElementById('locating-overlay').classList.remove('active');
      btn.disabled = false;
      btn.textContent = '📍 Near Me';

      saveLocation(lat, lng, 'Your Location');
      placeUserPin(lat, lng, 'Your Location');
      fetchCrimes(lat, lng, month);
    },
    () => {
      document.getElementById('locating-overlay').classList.remove('active');
      btn.disabled = false;
      btn.textContent = '📍 Near Me';
      setBadge('Location denied — try entering a postcode instead');
    },
    { timeout: 10000 }
  );
}

// ── POSTCODE FALLBACK — uses postcodes.io (free, no key needed) ───────────────
async function lookupPostcode() {
  const month = document.getElementById('monthInput').value;
  if (!month) { setBadge('Select a month first'); return; }

  const raw = document.getElementById('postcodeInput').value.trim().replace(/\s+/g, '');
  if (!raw) {
    flashError('postcodeInput');
    setBadge('Enter a postcode first');
    return;
  }

  const btn = document.getElementById('postcode-btn');
  btn.disabled = true;
  btn.textContent = '...';
  setBadge(`Looking up ${raw.toUpperCase()}...`);

  try {
    const res = await fetch(`https://api.postcodes.io/postcodes/${encodeURIComponent(raw)}`);
    const json = await res.json();

    if (json.status !== 200 || !json.result) {
      flashError('postcodeInput');
      setBadge(`Postcode "${raw.toUpperCase()}" not found`);
      return;
    }

    const { latitude: lat, longitude: lng, postcode } = json.result;
    saveLocation(lat, lng, postcode);
    placeUserPin(lat, lng, postcode);
    fetchCrimes(lat, lng, month);
    document.getElementById('postcodeInput').value = '';

  } catch (e) {
    flashError('postcodeInput');
    setBadge('Postcode lookup failed — check your connection');
  } finally {
    btn.disabled = false;
    btn.textContent = 'GO';
  }
}

function flashError(id) {
  const el = document.getElementById(id);
  el.classList.remove('error');
  void el.offsetWidth; // reflow to retrigger animation
  el.classList.add('error');
  setTimeout(() => el.classList.remove('error'), 400);
}

// ── USER PIN ──────────────────────────────────────────────────────────────────
function placeUserPin(lat, lng, label) {
  if (userMarker) userMarker.remove();
  userMarker = L.circleMarker([lat, lng], {
    radius: 9, fillColor: '#ffffff', color: '#ff3b3b',
    weight: 2, fillOpacity: 1, zIndexOffset: 1000
  }).addTo(map).bindPopup(`<div class="popup-cat">📍 ${label}</div>`);
}

// ── FETCH CRIMES ──────────────────────────────────────────────────────────────
function fetchCrimes(lat, lng, month) {
  const btn = document.getElementById('locate-btn');
  btn.disabled = true;
  setStatus('<span class="spinner"></span> Fetching crime data...');
  document.getElementById('stats').innerHTML = '';
  document.getElementById('panel-count').textContent = '—';
  markers.clearLayers();
  allCrimes = [];
  activeFilter = null;

  map.setView([lat, lng], 14);

  fetch(`https://data.police.uk/api/crimes-street/all-crime?lat=${lat}&lng=${lng}&date=${month}`)
    .then(res => {
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    })
    .then(data => {
      allCrimes = data;
      setBadge(`${data.length} incidents · ${month}`);
      if (!data.length) {
        setStatus('');
        document.getElementById('panel-count').textContent = '0';
        showNoDataModal(month);
      } else {
        renderCrimes(data);
      }
    })
    .catch(err => {
      setStatus('⚠ Error fetching data. API may be unavailable or no data for this period.');
      setBadge('Error');
      console.error(err);
    })
    .finally(() => {
      btn.disabled = false;
    });
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderCrimes(crimes) {
  markers.clearLayers();
  if (!crimes.length) return;

  document.getElementById('panel-count').textContent = crimes.length.toLocaleString() + ' incidents';

  const cats = {};
  crimes.forEach(c => { cats[c.category] = (cats[c.category] || 0) + 1; });
  const sorted = Object.entries(cats).sort((a, b) => b[1] - a[1]);

  const statsEl = document.getElementById('stats');
  statsEl.innerHTML = '';

  const allChip = makeChip(crimes.length, 'ALL', null, activeFilter === null);
  allChip.onclick = () => { activeFilter = null; renderCrimes(allCrimes); };
  statsEl.appendChild(allChip);

  sorted.forEach(([cat, count]) => {
    const label = catLabel(cat).replace('Crime', '').replace('Behaviour', 'Behav.').replace('Damage Arson', 'Damage').trim();
    const chip = makeChip(count, label, catColor(cat), activeFilter === cat);
    chip.onclick = () => { activeFilter = cat; renderCrimes(allCrimes.filter(c => c.category === cat)); };
    statsEl.appendChild(chip);
  });

  crimes.forEach(crime => {
    if (!crime.location) return;
    const lat = parseFloat(crime.location.latitude);
    const lng = parseFloat(crime.location.longitude);
    if (isNaN(lat) || isNaN(lng)) return;

    const color = catColor(crime.category);
    const outcome = crime.outcome_status?.category || 'Under investigation';

    L.circleMarker([lat, lng], {
      radius: 5, fillColor: color, color: color, weight: 0, fillOpacity: 0.75
    })
    .bindPopup(`
      <div class="popup-cat">${catLabel(crime.category)}</div>
      <div class="popup-row">📍 ${crime.location.street.name}</div>
      <div class="popup-row">📅 ${crime.month}</div>
      <div class="popup-row">🔎 ${outcome}</div>
    `, { maxWidth: 220 })
    .addTo(markers);
  });

  renderList(crimes);
  if (panelCollapsed) togglePanel();
}

function makeChip(count, label, color, isActive) {
  const chip = document.createElement('div');
  chip.className = 'stat-item' + (isActive ? ' active' : '');
  if (color) chip.style.borderTop = `2px solid ${color}`;
  chip.innerHTML = `
    <span class="stat-num" style="${color ? 'color:' + color : ''}">${count}</span>
    <span class="stat-label">${label}</span>
  `;
  return chip;
}

function renderList(crimes) {
  const list = document.getElementById('crime-list');
  list.innerHTML = '';

  crimes.slice(0, 100).forEach(crime => {
    const color = catColor(crime.category);
    const outcome = crime.outcome_status?.category || 'No outcome';
    const div = document.createElement('div');
    div.className = 'crime-item';
    div.innerHTML = `
      <div class="crime-dot" style="background:${color}"></div>
      <div class="crime-info">
        <div class="crime-cat">${catLabel(crime.category)}</div>
        <div class="crime-meta">📍 ${crime.location?.street?.name || 'Unknown'} &nbsp;·&nbsp; ${crime.month}</div>
        <div class="crime-outcome">${outcome}</div>
      </div>
    `;
    if (crime.location) {
      div.onclick = () => map.setView([
        parseFloat(crime.location.latitude),
        parseFloat(crime.location.longitude)
      ], 17);
    }
    list.appendChild(div);
  });

  if (crimes.length > 100) {
    const note = document.createElement('div');
    note.style.cssText = 'text-align:center;padding:12px;font-family:var(--mono);font-size:0.7rem;color:var(--text-dim)';
    note.textContent = `+ ${(crimes.length - 100).toLocaleString()} more (all shown on map)`;
    list.appendChild(note);
  }
}

function setStatus(html) {
  document.getElementById('crime-list').innerHTML = `<div id="status">${html}</div>`;
}

function setBadge(text) {
  const b = document.getElementById('status-badge');
  b.textContent = text;
  b.classList.add('visible');
}

function togglePanel() {
  panelCollapsed = !panelCollapsed;
  document.getElementById('panel').classList.toggle('collapsed', panelCollapsed);
  document.getElementById('toggle-icon').textContent = panelCollapsed ? '▲' : '▼';
}

function closeWelcome() {
  document.getElementById('welcome-backdrop').style.display = 'none';
}

function showNoDataModal(month) {
  const d = new Date(month + '-01');
  const label = d.toLocaleString('en-GB', { month: 'long', year: 'numeric' });
  document.getElementById('modal-body').textContent =
    'No crime records were returned for this area.';
  document.getElementById('modal-sub').innerHTML =
    'This may be because data for <span style="color:var(--text)">' + label + '</span> has not yet been published by the Home Office. ' +
    'The Police API typically lags 2–3 months behind. Try selecting an earlier month.';
  document.getElementById('modal-backdrop').classList.add('visible');
}

function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('visible');
}
</script>
